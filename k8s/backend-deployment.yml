apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsmart-backend
  labels:
    app: shopsmart-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopsmart-backend
  template:
    metadata:
      labels:
        app: shopsmart-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/amathziah/devops/backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: shopsmart-backend
spec:
  type: ClusterIP
  selector:
    app: shopsmart-backend
  ports:
  - port: 5000
    targetPort: 5000
