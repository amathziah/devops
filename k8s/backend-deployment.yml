apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsmart-backend
  labels:
    app: shopsmart-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: shopsmart-backend
  template:
    metadata:
      labels:
        app: shopsmart-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/amathziah/devops/backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: NODE_ENV
          value: "production"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shopsmart-backend
spec:
  type: ClusterIP
  selector:
    app: shopsmart-backend
  ports:
  - port: 80
    targetPort: 5000
