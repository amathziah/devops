apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsmart-frontend
  labels:
    app: shopsmart-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopsmart-frontend
  template:
    metadata:
      labels:
        app: shopsmart-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: frontend
        image: ghcr.io/amathziah/devops/frontend:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "200m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: shopsmart-frontend
spec:
  type: LoadBalancer
  selector:
    app: shopsmart-frontend
  ports:
  - port: 80
    targetPort: 80
