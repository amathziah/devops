apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopsmart-frontend
  labels:
    app: shopsmart-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shopsmart-frontend
  template:
    metadata:
      labels:
        app: shopsmart-frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/amathziah/devops/frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: shopsmart-frontend
spec:
  type: NodePort
  selector:
    app: shopsmart-frontend
  ports:
  - port: 3000
    targetPort: 80
