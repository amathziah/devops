name: Node.js CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    - name: Install dependencies
      run: npm ci
      working-directory: server
    - name: Run lint
      run: npm run lint
      working-directory: server
    - name: Run tests
      run: npm test
      working-directory: server

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: client/package-lock.json
    - name: Install dependencies
      run: npm ci
      working-directory: client
    - name: Run lint
      run: npm run lint
      working-directory: client
    - name: Run tests
      run: npm test
      working-directory: client
    - name: Build frontend
      run: npm run build
      working-directory: client
