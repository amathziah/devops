name: Production EC2 Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Production EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            # 1. Setup environment
            mkdir -p ~/app
            cd ~/app
            
            # 2. Sync Repository
            if [ ! -d ".git" ]; then
              git clone https://github.com/amathziah/devops.git .
            else
              git fetch --all
              git reset --hard origin/main
            fi

            # 3. Backend Deployment
            cd server
            npm install --omit=dev
            pm2 describe shopsmart-backend > /dev/null
            if [ $? -eq 0 ]; then
                pm2 restart shopsmart-backend
            else
                PORT=3000 pm2 start src/index.js --name "shopsmart-backend"
            fi

            # 4. Frontend Deployment
            cd ../client
            npm install
            VITE_API_URL=http://${{ secrets.EC2_HOST }}:3000 npm run build
            
            pm2 describe shopsmart-frontend > /dev/null
            if [ $? -eq 0 ]; then
                pm2 restart shopsmart-frontend
            else
                pm2 serve dist 5173 --name "shopsmart-frontend" --spa
            fi
            
            # 5. Persistence & Health Check
            pm2 save
            pm2 startup | grep "sudo" | bash - || true
            
            echo "Deployment successful! Site live at: http://${{ secrets.EC2_HOST }}:5173"
