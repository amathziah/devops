name: Production EC2 Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to Production EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build Frontend (CI Side)
        run: |
          set -x
          cd client
          npm install
          VITE_API_URL=http://${{ secrets.EC2_HOST }}:3000 npm run build
        env:
          VITE_API_URL: http://${{ secrets.EC2_HOST }}:3000

      - name: Deploy via SSH (Backend Sync)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -ex
            mkdir -p ~/app
            cd ~/app
            if [ -d ".git" ]; then
              git fetch --all
              git reset --hard origin/main
            else
              git clone https://github.com/amathziah/devops.git .
            fi
            cd server
            npm install --omit=dev
            pm2 describe shopsmart-backend > /dev/null && pm2 restart shopsmart-backend || PORT=3000 pm2 start src/index.js --name "shopsmart-backend"

      - name: Upload Build Artifacts to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "client/dist/*"
          target: "/home/ubuntu/app/client/dist/"
          overwrite: true

      - name: Finalize Frontend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pm2 describe shopsmart-frontend > /dev/null && pm2 restart shopsmart-frontend || pm2 serve /home/ubuntu/app/client/dist 5173 --name "shopsmart-frontend" --spa
            pm2 save
            echo "Deployment Complete!"
