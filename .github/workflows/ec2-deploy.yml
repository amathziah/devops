name: EC2 Automated Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    # Only run if CI tests pass
    # needs: [backend-test, frontend-test, e2e-test] 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # Navigate to project directory
            cd ~/devops || git clone https://github.com/${{ github.repository }}.git ~/devops && cd ~/devops
            
            # Pull latest changes
            git pull origin main
            
            # Automated deployment commands (Idempotent)
            echo "Building and starting services..."
            docker-compose -f docker-compose.yml build
            docker-compose -f docker-compose.yml up -d
            
            # Cleanup old images
            docker image prune -f
            
            # Health check
            echo "Verifying deployment..."
            sleep 10
            curl -f http://localhost:5000/health || exit 1
            
            echo "Deployment successful! 🚀"
