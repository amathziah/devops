services:
  backend:
    build:
      context: ./server
    container_name: shopsmart-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./client
    container_name: shopsmart-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
